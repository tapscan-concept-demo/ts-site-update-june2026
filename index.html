<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TapScan — Adaptive Experiences, Actionable Accountability</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/responsive.css">
<style>
  html, body { margin: 0; background: #fff; }
  * { box-sizing: border-box; }
  @keyframes tsFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes tsSlide { from { opacity: 0; transform: translateY(8px) scale(0.99); } to { opacity: 1; transform: none; } }
  html { scroll-behavior: smooth; }

  /* Scroll-triggered reveal */
  .ts-reveal { opacity: 0; transform: translateY(32px); transition: opacity 700ms cubic-bezier(0.2,0.8,0.2,1), transform 700ms cubic-bezier(0.2,0.8,0.2,1); will-change: opacity, transform; }
  .ts-reveal.is-visible { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) {
    .ts-reveal { opacity: 1; transform: none; transition: none; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root" data-screen-label="TapScan Home"></div>

<script src="components/image-slot.js"></script>
<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="components/hero-analytics.jsx"></script>
<script type="text/babel" src="components/globe.jsx"></script>
<script type="text/babel" src="components/dash-viz.jsx"></script>
<script type="text/babel" src="components/touchpoint-viz.jsx"></script>
<script type="text/babel" src="components/variation-a.jsx"></script>
<script type="text/babel" src="components/figma-sections.jsx"></script>

<script type="text/babel">
const { useState: useAppState } = React;

function App() {
  const [contact, setContact] = useAppState(false);

  // Scroll-triggered reveal: each section's inner content blocks fade
  // + slide up as the user scrolls into view (the section itself stays
  // put so the layout doesn't shift).
  React.useEffect(() => {
    const root = document.getElementById("root");
    if (!root) return;
    const sections = Array.from(root.querySelectorAll("section"));
    // Skip the first section (hero) so it appears immediately
    const contentSections = sections.slice(1);

    const items = [];
    contentSections.forEach(section => {
      // Pick the first container div inside the section, then animate
      // its direct children (the actual content blocks).
      const container = section.firstElementChild;
      if (!container) return;
      const blocks = Array.from(container.children);
      blocks.forEach((el, i) => {
        el.classList.add("ts-reveal");
        el.style.transitionDelay = (i * 90) + "ms";
        items.push(el);
      });
    });

    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add("is-visible");
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15, rootMargin: "0px 0px -60px 0px" });

    items.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
  const onDemo = () => window.open("https://calendly.com/katie-aotc/20min", "_blank", "noopener");
  const onContact = () => setContact(true);
  const onLogin = () => window.open("https://tapscan-platform.vercel.app/", "_blank", "noopener");
  const onCaseStudies = (tab) => {
    const q = tab ? "?tab=" + tab : "";
    window.location.href = "case-studies.html" + q;
  };
  const onLegal = (label) => {
    const map = { "Privacy": "privacy", "Terms & Conditions": "terms", "Cookies": "cookies", "Acceptable Use": "acceptable-use" };
    window.open("legal/" + map[label] + ".html", "_blank");
  };
  const onNav = (id) => {
    if (id === "top") { window.scrollTo({ top: 0, behavior: "smooth" }); return; }
    const el = document.getElementById(id);
    if (el) {
      const top = el.getBoundingClientRect().top + window.pageYOffset - 20;
      window.scrollTo({ top, behavior: "smooth" });
    }
  };

  return (
    <div style={{ fontFamily: "Montserrat", background: "#fff" }}>
      <window.TSHero onDemo={onDemo} onContact={onContact} onNav={onNav} onLogin={onLogin} />
      <window.TSFalls />
      <window.TSDynamic />
      <window.TSContextual />
      <window.VarA_Experience onCaseStudies={onCaseStudies} />
      <window.VarA_Accountability onCaseStudies={onCaseStudies} />
      <window.VarA_About />
      <window.TSFaq />
      <window.TSFooter onDemo={onDemo} onContact={onContact} onLogin={onLogin} onLegal={onLegal} />
      <window.TSModal open={contact} onClose={() => setContact(false)} width={520}>
        <window.ContactForm onClose={() => setContact(false)} />
      </window.TSModal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
