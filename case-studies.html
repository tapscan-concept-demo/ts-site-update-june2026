<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TapScan — Case Studies</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/responsive.css">
<style>
  html, body { margin: 0; background: #fff; }
  * { box-sizing: border-box; }
  @keyframes tsFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes tsSlide { from { opacity: 0; transform: translateY(8px) scale(0.99); } to { opacity: 1; transform: none; } }
  /* tsRise — staggered card pop-in. Slight upward translate + a subtle scale
     so each card feels like it lands rather than just fades. */
  @keyframes tsRise {
    0%   { opacity: 0; transform: translateY(22px) scale(0.96); }
    60%  { opacity: 1; }
    100% { opacity: 1; transform: translateY(0)    scale(1); }
  }
  .ts-card { animation: tsRise 1320ms cubic-bezier(0.2,0.8,0.2,1) both; }

  /* Case-studies hero: slow drifting gradient. A base linear gradient is
     covered by two large soft-radial highlights that pan in opposite
     directions across a 24s loop. Effect is intentionally subtle — no
     hue change, no big swings, just a quiet sense of motion. */
  .ts-cs-hero {
    position: relative;
    overflow: hidden;
    isolation: isolate;
    background: linear-gradient(to bottom left, #6976E7 0%, #2F3886 100%);
  }
  .ts-cs-hero::before,
  .ts-cs-hero::after {
    content: "";
    position: absolute; inset: -20%;
    z-index: 0;
    pointer-events: none;
    will-change: transform, opacity;
  }
  .ts-cs-hero::before {
    background:
      radial-gradient(closest-side at 30% 30%, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 60%),
      radial-gradient(closest-side at 70% 80%, rgba(105,118,231,0.55) 0%, rgba(105,118,231,0) 65%);
    background-size: 140% 140%, 140% 140%;
    background-repeat: no-repeat;
    animation: tsCsHeroDriftA 28s ease-in-out infinite alternate;
  }
  .ts-cs-hero::after {
    background:
      radial-gradient(closest-side at 80% 25%, rgba(255,184,85,0.10) 0%, rgba(255,184,85,0) 65%),
      radial-gradient(closest-side at 20% 75%, rgba(28,34,80,0.30) 0%, rgba(28,34,80,0) 65%);
    background-size: 160% 160%, 160% 160%;
    background-repeat: no-repeat;
    animation: tsCsHeroDriftB 36s ease-in-out infinite alternate;
    mix-blend-mode: soft-light;
  }
  @keyframes tsCsHeroDriftA {
    0%   { background-position:   0%   0%,  100% 100%; }
    50%  { background-position:  40%  20%,   60%  80%; }
    100% { background-position: 100% 100%,    0%   0%; }
  }
  @keyframes tsCsHeroDriftB {
    0%   { background-position: 100%   0%,    0% 100%; }
    50%  { background-position:  60%  40%,   40%  60%; }
    100% { background-position:   0% 100%,  100%   0%; }
  }
  .ts-cs-hero > * { position: relative; z-index: 1; }
  @media (prefers-reduced-motion: reduce) {
    .ts-cs-hero::before, .ts-cs-hero::after { animation: none; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root" data-screen-label="Case Studies"></div>

<script src="components/image-slot.js"></script>
<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="components/charts.jsx"></script>
<script type="text/babel" src="components/case-studies-data.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// Per-type colors that drive the pill dot, accent period, and dashboard
// chart palette via the `type` prop on each <TSChart>.
const TYPE_COLOR = {
  experience:     "#FFB855",
  accountability: "#6976E7",
  other:          "#2F3886",
};
const TYPE_BAND_BG = {
  experience:     "#FFF6EA",
  accountability: "#F5F6FF",
  other:          "#EEF0F8",
};
// Dashboard background — light wash of the service color so the section
// still reads as branded, but stays comfortable to look at.
const TYPE_DASH_BG = {
  experience:     "#FFF6EA",
  accountability: "#ECEEFF",
  other:          "#E2E6F5",
};
function typeLabel(t) {
  return t === "experience" ? "Experience" : t === "accountability" ? "Accountability" : "Other";
}

// ──────────────────────────────────────────────────────────────
// CARD — grid tile shown on the listing.
function CaseCard({ cs, onOpen, idx }) {
  const [hover, setHover] = useState(false);
  const color = TYPE_COLOR[cs.type];
  return (
    <div
      onClick={() => onOpen(cs)}
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      className="ts-card"
      style={{
        background: "#fff", borderRadius: 16, overflow: "hidden",
        border: "1px solid #DDDFEE", cursor: "pointer",
        transition: "all 220ms cubic-bezier(0.2,0.8,0.2,1)",
        transform: hover ? "translateY(-4px)" : "none",
        boxShadow: hover ? "0 12px 28px rgba(15,17,17,0.10)" : "none",
        animationDelay: (idx * 225) + "ms",
        display: "flex", flexDirection: "column",
      }}>
      {/* visual band */}
      <div style={{
        background: TYPE_BAND_BG[cs.type],
        padding: "24px 24px 0",
        position: "relative", height: 260,
        display: "flex", alignItems: "center", justifyContent: "center",
        overflow: "hidden",
      }}>
        <image-slot
          id={"cs-cover-" + cs.id}
          src={cs.image || undefined}
          shape="rect"
          placeholder={"Cover photo for " + cs.client}
          style={{ position: "absolute", inset: 0, width: "100%", height: "100%", border: "none", background: "transparent" }}
        />
        <div style={{
          position: "absolute", top: 16, left: 16, zIndex: 2,
          fontWeight: 700, fontSize: 11, letterSpacing: "0.04em",
          color: "#212331", background: "#fff", padding: "6px 12px", borderRadius: 999,
          display: "inline-flex", alignItems: "center", gap: 6,
          boxShadow: "0 1px 2px rgba(0,0,0,0.08)",
        }}>
          <span style={{ width: 8, height: 8, borderRadius: 999, background: color }} />
          {cs.client}
        </div>
        {cs.logo &&
        <img src={cs.logo} alt={cs.client + " logo"} style={{
          position: "absolute", zIndex: 2,
          left: "50%", top: "50%",
          transformOrigin: "center",
          transform: "translate(-50%, -50%) scale(" + (hover ? 1.085 : 1) + ")",
          width: "auto", height: "auto", maxWidth: "46%", maxHeight: 70,
          transition: "transform 360ms cubic-bezier(0.2,0.8,0.2,1)",
          pointerEvents: "none",
          filter: "drop-shadow(0 2px 14px rgba(0,0,0,0.35))",
        }} />
        }
      </div>
      <div style={{ padding: "24px 24px 28px", flex: 1, display: "flex", flexDirection: "column" }}>
        <div style={{ fontSize: 11, color: color, fontWeight: 700, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 8 }}>{typeLabel(cs.type)}</div>
        <h3 style={{ fontWeight: 900, fontSize: 18, margin: 0, color: "#212331", lineHeight: 1.3, letterSpacing: "-0.01em" }}>
          {cs.title.replace(/\.$/, "")}
          <span style={{ color }}>.</span>
        </h3>
        <p style={{ fontSize: 13, color: "#7A7D8F", margin: "10px 0 0", lineHeight: 1.55, fontWeight: 500 }}>{cs.summary}</p>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────
// DETAIL — full case study view (problem / solution / outcome + dashboard).
function CaseStudyDetail({ cs, onClose, onContact }) {
  if (!cs) return null;
  const color = TYPE_COLOR[cs.type];
  const sections = [
    { label: "The Problem",  text: cs.problem  },
    { label: "The Solution", text: cs.solution },
    { label: "The Outcome",  text: cs.outcome  },
  ];
  const dashBg       = TYPE_DASH_BG[cs.type];
  const dashFg       = "#1C2250";
  const dashFgMuted  = "rgba(28,34,80,0.62)";
  const dashInsight  = "rgba(28,34,80,0.05)";
  const dashInsightBd= "rgba(28,34,80,0.12)";

  useEffect(() => { window.scrollTo({ top: 0, behavior: "auto" }); }, [cs.id]);

  // 4 charts laid out as a 2×2 grid on desktop. The map chart, when
  // present, gets a card that's a little taller to accommodate the
  // outline + bubbles.
  const charts = (cs.dashboard && cs.dashboard.charts) || [];

  return (
    <div style={{ fontFamily: "Montserrat", background: "#fff", paddingTop: 72 }}>
      {/* HERO — placeholder grey for now; final imagery / treatment TBD. */}
      <section data-screen-label={"Case Study — " + cs.client} style={{
        background: "#E5E7EC",
        position: "relative",
        height: 630, overflow: "hidden",
      }}>
        <image-slot
          id={"cs-hero-" + cs.id}
          src={cs.image || undefined}
          shape="rect"
          placeholder={"Hero photo for " + cs.client}
          style={{ position: "absolute", inset: 0, width: "100%", height: "100%", border: "none", background: "transparent" }}
        />
        {cs.logo &&
        <img src={cs.logo} alt={cs.client + " logo"} style={{
          position: "absolute", zIndex: 2,
          left: "50%", top: "46%",
          transform: "translate(-50%, -50%)",
          width: "auto", height: "auto", maxWidth: 360, maxHeight: 116,
          pointerEvents: "none",
          filter: "drop-shadow(0 4px 22px rgba(0,0,0,0.4))",
        }} />
        }
        {/* Back button */}
        <div style={{ position: "absolute", left: 0, right: 0, top: 0, zIndex: 3, padding: "32px 64px 0" }}>
          <div style={{ maxWidth: 1180, margin: "0 auto" }}>
            <button onClick={onClose} style={{
              display: "inline-flex", alignItems: "center", gap: 10,
              background: "#fff", color: "#1C2250",
              border: "none",
              padding: "14px 22px", borderRadius: 8,
              fontFamily: "Montserrat", fontWeight: 700, fontSize: 14, cursor: "pointer",
              boxShadow: "0 6px 18px rgba(15,17,17,0.18)",
              transition: "all 180ms"
            }}
            onMouseEnter={(e) => { e.currentTarget.style.background = "#FFB855"; e.currentTarget.style.color = "#1C2250"; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = "#fff";    e.currentTarget.style.color = "#1C2250"; }}>
              <span style={{ color: "#FFB855", fontSize: 18, lineHeight: 1, fontWeight: 900 }}>←</span>
              Back to case studies
            </button>
          </div>
        </div>
        {/* Bottom shadow — plain dark gradient for legibility, no brand tint. */}
        <div style={{
          position: "absolute", left: 0, right: 0, bottom: 0,
          padding: "32px 64px",
          background: "linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.78) 100%)",
          color: "#fff",
        }}>
          <div style={{ maxWidth: 1180, margin: "0 auto" }}>
            <h1 style={{ fontWeight: 900, fontSize: 36, margin: 0, color: "#fff", lineHeight: 1.15, letterSpacing: "-0.015em", textShadow: "0 2px 8px rgba(0,0,0,0.3)", maxWidth: 880 }}>
              {cs.title.replace(/\.$/, "")}
              <span style={{ color }}>.</span>
            </h1>
            {/* Industry + locations pills.
                First pill: solid white, no border. Second pill: a much
                lighter wash of the service color, also no border. */}
            <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginTop: 18 }}>
              <span style={{
                padding: "8px 18px", borderRadius: 999,
                background: "#FFFFFF",
                border: "none",
                color: "#1C2250", fontWeight: 700, fontSize: 13,
              }}>{cs.industry}</span>
              <span style={{
                padding: "8px 18px", borderRadius: 999,
                background: cs.type === "experience" ? "#FFE8C7" : "#E3E6FB",
                border: "none",
                color: "#1C2250", fontWeight: 700, fontSize: 13,
              }}>{cs.locations}</span>
            </div>
          </div>
        </div>
      </section>

      {/* STORY */}
      <div style={{ background: "#fff", padding: "56px 64px" }}>
        <div style={{ maxWidth: 1180, margin: "0 auto" }}>
          <div style={{ display: "grid", gap: 32 }}>
            {sections.map((s) => (
              <div key={s.label}>
                <h3 style={{ fontWeight: 900, fontSize: 22, margin: 0, color: "#212331", letterSpacing: "-0.01em" }}>
                  {s.label}<span style={{ color }}>.</span>
                </h3>
                <p style={{ fontSize: 16, lineHeight: 1.65, color: "#212331", margin: "12px 0 0" }}>{s.text}</p>
              </div>
            ))}
          </div>

          <div style={{ marginTop: 48 }}>
            <div style={{ fontWeight: 700, fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: "#7A7D8F", marginBottom: 12 }}>Project photos</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
              {[1,2,3].map(n => (
                <image-slot
                  key={n}
                  id={"cs-photo-" + cs.id + "-" + n}
                  shape="rounded"
                  radius="12"
                  placeholder={"Photo " + n}
                  style={{ aspectRatio: "4 / 3", width: "100%" }}
                />
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* DASHBOARD */}
      <div style={{ background: dashBg, color: dashFg, padding: "56px 64px" }}>
        <div style={{ maxWidth: 1180, margin: "0 auto" }}>
          <div style={{ marginBottom: 28 }}>
            <div style={{ display: "inline-flex", alignItems: "center", gap: 8, whiteSpace: "nowrap", background: color, color: "#fff", fontWeight: 800, fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", padding: "7px 14px", borderRadius: 999, marginBottom: 14 }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true" style={{ flexShrink: 0 }}>
                <circle cx="12" cy="12" r="10" stroke="#fff" strokeWidth="2" />
                <line x1="12" y1="7" x2="12" y2="13" stroke="#fff" strokeWidth="2" strokeLinecap="round" />
                <circle cx="12" cy="17" r="1.3" fill="#fff" />
              </svg>
              Example Dashboard — Not Real Metrics
            </div>
            <h2 style={{ fontWeight: 900, fontSize: 28, margin: 0, color: dashFg, letterSpacing: "-0.01em" }}>
              What the client sees in market<span style={{ color }}>.</span>
            </h2>
            <p style={{ display: "flex", alignItems: "flex-start", gap: 9, fontSize: 13, color: dashFgMuted, margin: "10px 0 0", maxWidth: 720, lineHeight: 1.55, fontStyle: "italic" }}>
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true" style={{ flexShrink: 0, marginTop: 2 }}>
                <circle cx="12" cy="12" r="10" stroke={color} strokeWidth="2" />
                <line x1="12" y1="7" x2="12" y2="13" stroke={color} strokeWidth="2" strokeLinecap="round" />
                <circle cx="12" cy="17" r="1.3" fill={color} />
              </svg>
              <span>The visualized data shown here is for illustrative purposes only and does not reflect actual client performance metrics or proprietary information.</span>
            </p>
          </div>

          {/* Headline metrics */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ fontWeight: 700, fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: dashFgMuted, marginBottom: 12 }}>Headline metrics</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
              {cs.metrics.map((m, i) => (
                <div key={i} style={{ background: "#fff", borderRadius: 12, padding: "20px 20px" }}>
                  <div style={{ fontWeight: 900, fontSize: 32, color: "#1C2250", letterSpacing: "-0.01em", lineHeight: 1.05 }}>{m.v}</div>
                  <div style={{ fontSize: 12, color: "#7A7D8F", marginTop: 6, fontWeight: 600 }}>{m.l}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Interactive charts — 2×2 grid. Hover any bar / segment / point. */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ fontWeight: 700, fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: dashFgMuted, marginBottom: 12 }}>Performance breakdown</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 12 }}>
              {charts.map((c, i) => (
                <window.TSChartCard key={i} title={c.title} height={c.kind === "map" ? 260 : 240}>
                  <window.TSChart kind={c.kind} type={cs.type} data={c.data} region={c.region} />
                </window.TSChartCard>
              ))}
            </div>
          </div>

          {/* Report insights */}
          <div>
            <div style={{ fontWeight: 700, fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: dashFgMuted, marginBottom: 12 }}>Report insights</div>
            <div style={{ background: dashInsight, border: "1px solid " + dashInsightBd, borderRadius: 12, padding: "22px 26px" }}>
              <ul style={{ margin: 0, paddingLeft: 0, listStyle: "none", display: "grid", gap: 14 }}>
                {(cs.dashboard && cs.dashboard.insights ? cs.dashboard.insights : []).map((line, i) => (
                  <li key={i} style={{ display: "flex", gap: 14, alignItems: "flex-start", fontSize: 14, lineHeight: 1.55, color: dashFg }}>
                    <span style={{
                      width: 24, height: 24, borderRadius: 999, background: color,
                      color: color === "#FFB855" ? "#1C2250" : "#fff",
                      fontWeight: 900, fontSize: 12, display: "grid", placeItems: "center",
                      flexShrink: 0, marginTop: 1,
                    }}>{i + 1}</span>
                    <span>{line}</span>
                  </li>
                ))}
              </ul>
            </div>
          </div>
        </div>
      </div>

      {/* CTA */}
      <div style={{ padding: "56px 64px", background: "#F5F6FF" }}>
        <div style={{ maxWidth: 1180, margin: "0 auto", padding: "32px 36px", background: "#fff", borderRadius: 16, border: "1px solid #DDDFEE" }}>
          <h3 style={{ fontWeight: 900, fontSize: 22, margin: 0, color: "#212331", letterSpacing: "-0.01em" }}>
            Want to learn more about the process and see the full picture<span style={{ color }}>?</span>
          </h3>
          <p style={{ fontSize: 15, lineHeight: 1.65, color: "#212331", margin: "10px 0 22px" }}>
            We&rsquo;re happy to walk through logistics and how TapScan can work for your brand &mdash; from rollout shape to integrations, timelines, and what success looks like for your team.
          </p>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            <button onClick={() => { onContact && onContact(); }} style={{
              fontFamily: "Montserrat", fontWeight: 700, fontSize: 15,
              padding: "16px 28px", borderRadius: 8,
              background: "#2F3886", color: "#fff", border: "none", cursor: "pointer",
              transition: "background 180ms",
            }}
            onMouseEnter={(e) => e.currentTarget.style.background = "#1C2250"}
            onMouseLeave={(e) => e.currentTarget.style.background = "#2F3886"}>
              Let&rsquo;s talk logistics</button>
            <button onClick={onClose} style={{
              fontFamily: "Montserrat", fontWeight: 700, fontSize: 15,
              padding: "16px 28px", borderRadius: 8,
              background: "transparent", color: "#212331", border: "1px solid #DDDFEE", cursor: "pointer",
            }}>Back to case studies</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────
// PAGE
function CaseStudiesPage() {
  const initialTab = (() => {
    const p = new URLSearchParams(window.location.search).get("tab");
    return p === "accountability" || p === "experience" || p === "all" ? p : "experience";
  })();
  const [filter, setFilter] = useState(initialTab);
  const [hoveredTab, setHoveredTab] = useState(null);
  const [open, setOpen] = useState(null);
  const [contact, setContact] = useState(false);

  const all = window.CASE_STUDIES || [];
  const filtered = filter === "all" ? all : all.filter(cs => cs.type === filter);
  const tabs = [
    { id: "experience",     label: "Experience",     count: all.filter(c=>c.type==="experience").length },
    { id: "accountability", label: "Accountability", count: all.filter(c=>c.type==="accountability").length },
    { id: "all",            label: "View All",       count: all.length },
  ];

  return (
    <div style={{ fontFamily: "Montserrat" }}>
      <window.TSHeader variant={open ? "onNavy" : "onPhoto"}
        onNav={(id) => { if (id === "top") window.location.href = "index.html"; else window.location.href = "index.html#" + id; }}
        onContact={() => setContact(true)}
        onLogin={() => window.open("https://tapscan-platform.vercel.app/", "_blank", "noopener")}
        onDemo={() => window.open("https://calendly.com/katie-aotc/20min", "_blank", "noopener")} />

      {open ? (
        <CaseStudyDetail cs={open} onClose={() => setOpen(null)} onContact={() => { setOpen(null); setContact(true); }} />
      ) : (
      <>
      {/* HERO — brand gradient with subtle, slow drifting accents. */}
      <section className="ts-cs-hero" style={{
        color: "#fff",
        paddingBottom: 200,
        textAlign: "center",
        paddingTop: 180,
      }}>
        <div style={{ maxWidth: 1480, margin: "0 auto", padding: "0 24px" }}>
          <h1 style={{
            fontFamily: "Montserrat", fontWeight: 900,
            lineHeight: 1.05, margin: 0,
            letterSpacing: "-0.02em",
            color: "#fff",
            textShadow: "4px 4px 4px rgba(0,0,0,0.25), -4px -4px 4px rgba(0,0,0,0.25)",
            fontSize: 48,
          }}>Real Campaigns<span style={{ color: "#FFB855" }}>,</span> Real Results<span style={{ color: "#FFB855" }}>.</span></h1>
          <p style={{
            fontFamily: "Montserrat", fontWeight: 300,
            fontSize: 22, lineHeight: 1.4, marginTop: 28,
            color: "#fff",
            maxWidth: 820, marginLeft: "auto", marginRight: "auto",
            textShadow: "2px 2px 4px rgba(0,0,0,0.3)",
          }}>See how brands use TapScan to turn physical touchpoints into measurable engagement, validated execution, and connected experiences<span style={{ color: "#FFB855", fontWeight: 900 }}>.</span></p>
        </div>
      </section>

      {/* TABS */}
      <section className="ts-cs-tabs-section" style={{ background: "#fff", borderBottom: "1px solid #DDDFEE", position: "sticky", top: 72, zIndex: 30 }}>
        <div className="ts-cs-tabs" style={{ maxWidth: 1180, margin: "0 auto", padding: "0 64px", display: "flex", justifyContent: "center", gap: 8 }}>
          {tabs.map(t => {
            const active = filter === t.id;
            const hovered = hoveredTab === t.id;
            // The "View All" tab's underline is a two-stop gradient — brand
            // gold → main brand blue — to reflect that it spans every service
            // category. The count pill stays a solid brand-blue.
            const allGradient = "linear-gradient(90deg, #FFB855 0%, #2F3886 100%)";
            const isAll = t.id === "all";
            const tabColor = t.id === "experience" ? "#FFB855" : t.id === "accountability" ? "#6976E7" : "#2F3886";
            const pillTextOnColor = t.id === "experience" ? "#1C2250" : "#FFFFFF";
            const showColor = active || hovered;
            return (
              <button key={t.id} onClick={() => setFilter(t.id)}
                className="ts-cs-tab"
                onMouseEnter={() => setHoveredTab(t.id)}
                onMouseLeave={() => setHoveredTab(null)}
                style={{
                  position: "relative",
                  fontFamily: "Montserrat", fontWeight: 700, fontSize: 15,
                  padding: "22px 4px 18px",
                  margin: "0 18px",
                  background: "transparent",
                  color: showColor ? "#212331" : "#7A7D8F",
                  border: "none",
                  cursor: "pointer",
                  transition: "color 180ms",
                  display: "inline-flex", alignItems: "center", gap: 10,
                }}>
                {t.label}
                <span style={{
                  background: showColor ? tabColor : "#F0EFEC",
                  color: showColor ? pillTextOnColor : "#7A7D8F",
                  fontSize: 11, fontWeight: 700, padding: "3px 9px", borderRadius: 999,
                  transition: "all 180ms",
                }}>{t.count}</span>
                {/* Bottom underline — rendered as an absolutely-positioned bar
                    so the "View All" tab can carry a multi-stop gradient that
                    a plain border-bottom can't express. */}
                <span aria-hidden="true" style={{
                  position: "absolute", left: 0, right: 0, bottom: 0,
                  height: 3,
                  background: showColor ? (isAll ? allGradient : tabColor) : "transparent",
                  transition: "background 180ms",
                }} />
              </button>
            );
          })}
        </div>
      </section>

      {/* grid */}
      <section style={{ padding: "48px 64px 96px", background: "#fff" }}>
        <div style={{ maxWidth: 1180, margin: "0 auto" }}>
          <div className="ts-case-grid" style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 28 }}>
            {filtered.map((cs, i) => (
              // Including `filter` in the key forces React to unmount + remount
              // every card whenever the user picks a new tab — which re-runs
              // the `tsRise` CSS animation so the cards visibly pop back in,
              // one by one, with a staggered delay.
              <CaseCard key={filter + "-" + cs.id} cs={cs} idx={i} onOpen={setOpen} />
            ))}
          </div>
        </div>
      </section>
      </>
      )}

      <window.TSFooter
        onDemo={() => window.open("https://calendly.com/katie-aotc/20min", "_blank", "noopener")}
        onContact={() => setContact(true)}
        onLogin={() => window.open("https://tapscan-platform.vercel.app/", "_blank", "noopener")}
        onLegal={(label) => {
          const slug = { "Privacy": "privacy", "Terms & Conditions": "terms", "Cookies": "cookies", "Acceptable Use": "acceptable-use" }[label];
          window.location.href = "legal/" + slug + ".html";
        }} />

      <window.TSModal open={contact} onClose={() => setContact(false)} width={520}>
        <window.ContactForm onClose={() => setContact(false)} />
      </window.TSModal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CaseStudiesPage />);
</script>
</body>
</html>
